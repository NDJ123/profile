  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r\n   market semantics. All surfaces are dark; there is no light mode.\n   ============================================================ */\n:root {\n  /* ---- Base: indigo / navy surface scale (darkest → lightest) ---- */\n  --navy-950: #100e2e; /* deepest wells, modal scrim base */\n  --navy-900: #16153c; /* app page background */\n  --navy-850: #191b40; /* top navigation bar */\n  --navy-800: #1b2147; /* base card on darker views (Radar) */\n  --navy-750: #222a54; /* elevated card / row */\n  --navy-700: #28395c; /* card on lighter views (Dashboard), hover */\n  --navy-600: #313a68; /* raised control, selected row */\n  --navy-500: #3c4576; /* strong hover, track fill */\n\n  /* ---- Hairlines & dividers ---- */\n  --border-subtle: rgba(255, 255, 255, 0.06);\n  --border-default: rgba(255, 255, 255, 0.10);\n  --border-strong: rgba(255, 255, 255, 0.16);\n  --border-line: #2c3463; /* solid indigo divider */\n\n  /* ---- Text ---- */\n  --text-primary: #f4f5fb;   /* headings, key numbers */\n  --text-body: #d7dAeC;      /* body copy */\n  --text-secondary: #a6abce; /* labels, muted lavender-grey */\n  --text-tertiary: #71769f;  /* captions, disabled, placeholders */\n  --text-on-accent: #0c1a08; /* dark text on lime buttons */\n  --text-on-blue: #ffffff;\n\n  /* ---- Brand ---- */\n  --brand-green: #7cbf44;        /* logo bars, primary BUY/positive */\n  --brand-green-hover: #8fd053;\n  --brand-green-press: #6aa838;\n  --brand-lime: #a3d61a;         /* vivid active-nav glow / live accent */\n  --brand-lime-glow: rgba(163, 214, 26, 0.55);\n  --brand-cyan: #36c8de;         /* links, active tabs, highlights */\n  --brand-cyan-bright: #5be6e6;  /* gradient top, hover */\n  --brand-teal: #3dd9c0;\n  --brand-blue: #2f80c8;         /* secondary action (View Report) */\n  --brand-blue-hover: #3a92dd;\n\n  /* ---- Market / status semantics ---- */\n  --buy: #7cbf44;        /* BUY orders, profit */\n  --buy-bg: rgba(124, 191, 68, 0.14);\n  --sell: #ec5a5d;       /* SELL orders, loss */\n  --sell-bg: rgba(236, 90, 93, 0.14);\n  --bullish: #5fcf6a;\n  --bearish: #ec5a5d;\n  --profit: #6ec96d;     /* +£ figures */\n  --loss: #ec5a5d;       /* -£ figures */\n\n  --success: #5fcf6a;\n  --warning: #deb157;    /* STRETCHED / caution amber */\n  --warning-bg: rgba(222, 177, 87, 0.14);\n  --danger: #ec5a5d;\n  --info: #36c8de;\n\n  /* ---- Signal-status pill colors ---- */\n  --status-valid: #36c8de;\n  --status-fresh: #5fcf6a;\n  --status-stretched: #deb157;\n  --status-expired: #ec5a5d;\n\n  /* ---- Chart candles ---- */\n  --candle-up: #b6e02a;     /* bullish candle (lime) */\n  --candle-down: #ec5a5d;   /* bearish candle */\n  --chart-zone: rgba(54, 200, 222, 0.30); /* cyan highlight zone */\n\n  /* ---- Semantic surface aliases ---- */\n  --surface-page: var(--navy-900);\n  --surface-nav: var(--navy-850);\n  --surface-card: var(--navy-700);\n  --surface-card-dark: var(--navy-800);\n  --surface-raised: var(--navy-600);\n  --surface-input: var(--navy-800);\n  --surface-hover: var(--navy-600);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SmartCharts — Typography tokens\n   Single family: Open Sans. Clean, neutral, highly legible at the\n   small sizes a data-dense trading UI demands. Headings are tight\n   and confident; labels are uppercased with tracking; numbers run\n   in the same family (tabular where it matters).\n   ============================================================ */\n:root {\n  --font-sans: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  /* Numeric/price contexts: same family, tabular figures */\n  --font-numeric: 'Open Sans', ui-monospace, 'SF Mono', menlo, monospace;\n\n  /* ---- Font sizes ---- */\n  --text-2xs: 11px;  /* micro labels, pill text */\n  --text-xs: 12px;   /* table meta, captions */\n  --text-sm: 13px;   /* secondary body, controls */\n  --text-base: 14px; /* default body */\n  --text-md: 15px;\n  --text-lg: 16px;\n  --text-xl: 18px;   /* card titles */\n  --text-2xl: 20px;\n  --text-3xl: 24px;  /* section headings */\n  --text-4xl: 28px;  /* page title (Welcome back) */\n  --text-5xl: 34px;\n  --text-6xl: 44px;\n\n  /* ---- Weights ---- */\n  --weight-light: 300;\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n  --weight-extrabold: 800;\n\n  /* ---- Line heights ---- */\n  --leading-tight: 1.15;\n  --leading-snug: 1.3;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight: -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide: 0.04em;\n  --tracking-wider: 0.08em;  /* uppercase nav labels */\n  --tracking-widest: 0.12em; /* tiny uppercase pills */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SmartCharts — Spacing, radii, shadows, borders, motion\n   Compact, grid-aligned spacing for a dense workspace. Cards are\n   softly rounded (10–14px) with quiet borders and low-contrast\n   shadows that read against the dark indigo ground.\n   ============================================================ */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* ---- Radii ---- */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;   /* buttons, pills, inputs */\n  --radius-lg: 10px;  /* default card */\n  --radius-xl: 14px;  /* large panels */\n  --radius-2xl: 18px;\n  --radius-pill: 999px;\n\n  /* ---- Borders ---- */\n  --border-width: 1px;\n\n  /* ---- Shadows (dark-ground; subtle elevation + accent glows) ---- */\n  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.35);\n  --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.35);\n  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.45);\n  --shadow-xl: 0 24px 60px rgba(0, 0, 0, 0.55);\n  /* Glows used for live/active states */\n  --glow-lime: 0 0 0 1px var(--brand-lime), 0 0 12px var(--brand-lime-glow);\n  --glow-cyan: 0 0 16px rgba(54, 200, 222, 0.45);\n  --glow-buy: 0 0 14px rgba(124, 191, 68, 0.40);\n\n  /* ---- Layout ---- */\n  --nav-height: 64px;\n  --container-max: 1440px;\n  --right-rail: 420px;\n\n  /* ---- Motion ---- */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 180ms; /* @kind other */\n  --duration-slow: 260ms; /* @kind other */\n  --transition-base: all var(--duration-base) var(--ease-out);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   SmartCharts — base reset & element defaults\n   Sets the dark indigo ground and Open Sans defaults so any page\n   linking styles.css inherits the platform look immediately.\n   ============================================================ */\n*,\n*::before,\n*::after {\n  box-sizing: border-box;\n}\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  font-weight: var(--weight-regular);\n  line-height: var(--leading-normal);\n  color: var(--text-body);\n  background-color: var(--surface-page);\n}\n\nh1, h2, h3, h4, h5, h6 {\n  margin: 0;\n  color: var(--text-primary);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n}\n\np { margin: 0; }\n\na {\n  color: var(--brand-cyan);\n  text-decoration: none;\n  transition: color var(--duration-fast) var(--ease-out);\n}\na:hover { color: var(--brand-cyan-bright); }\n\nbutton {\n  font-family: inherit;\n  cursor: pointer;\n}\n\n/* Tabular figures for any price/number context */\n.tabular-nums {\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: 'tnum' 1;\n}\n\n ;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"368b9a4d-f6fc-42f2-b2a8-fcc447167534\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   SmartCharts — Color tokens\n   A dark, indigo-navy trading workspace with a vivid lime-green\n   brand accent, electric cyan highlights, and red/green/amber\n   market semantics. All surfaces are dark; there is no light mode.\n   ============================================================ */\n:root {\n  /* ---- Base: indigo / navy surface scale (darkest → lightest) ---- */\n  --navy-950: #100e2e; /* deepest wells, modal scrim base */\n  --navy-900: #16153c; /* app page background */\n  --navy-850: #191b40; /* top navigation bar */\n  --navy-800: #1b2147; /* base card on darker views (Radar) */\n  --navy-750: #222a54; /* elevated card / row */\n  --navy-700: #28395c; /* card on lighter views (Dashboard), hover */\n  --navy-600: #313a68; /* raised control, selected row */\n  --navy-500: #3c4576; /* strong hover, track fill */\n\n  /* ---- Hairlines & dividers ---- */\n  --border-subtle: rgba(255, 255, 255, 0.06);\n  --border-default: rgba(255, 255, 255, 0.10);\n  --border-strong: rgba(255, 255, 255, 0.16);\n  --border-line: #2c3463; /* solid indigo divider */\n\n  /* ---- Text ---- */\n  --text-primary: #f4f5fb;   /* headings, key numbers */\n  --text-body: #d7dAeC;      /* body copy */\n  --text-secondary: #a6abce; /* labels, muted lavender-grey */\n  --text-tertiary: #71769f;  /* captions, disabled, placeholders */\n  --text-on-accent: #0c1a08; /* dark text on lime buttons */\n  --text-on-blue: #ffffff;\n\n  /* ---- Brand ---- */\n  --brand-green: #7cbf44;        /* logo bars, primary BUY/positive */\n  --brand-green-hover: #8fd053;\n  --brand-green-press: #6aa838;\n  --brand-lime: #a3d61a;         /* vivid active-nav glow / live accent */\n  --brand-lime-glow: rgba(163, 214, 26, 0.55);\n  --brand-cyan: #36c8de;         /* links, active tabs, highlights */\n  --brand-cyan-bright: #5be6e6;  /* gradient top, hover */\n  --brand-teal: #3dd9c0;\n  --brand-blue: #2f80c8;         /* secondary action (View Report) */\n  --brand-blue-hover: #3a92dd;\n\n  /* ---- Market / status semantics ---- */\n  --buy: #7cbf44;        /* BUY orders, profit */\n  --buy-bg: rgba(124, 191, 68, 0.14);\n  --sell: #ec5a5d;       /* SELL orders, loss */\n  --sell-bg: rgba(236, 90, 93, 0.14);\n  --bullish: #5fcf6a;\n  --bearish: #ec5a5d;\n  --profit: #6ec96d;     /* +£ figures */\n  --loss: #ec5a5d;       /* -£ figures */\n\n  --success: #5fcf6a;\n  --warning: #deb157;    /* STRETCHED / caution amber */\n  --warning-bg: rgba(222, 177, 87, 0.14);\n  --danger: #ec5a5d;\n  --info: #36c8de;\n\n  /* ---- Signal-status pill colors ---- */\n  --status-valid: #36c8de;\n  --status-fresh: #5fcf6a;\n  --status-stretched: #deb157;\n  --status-expired: #ec5a5d;\n\n  /* ---- Chart candles ---- */\n  --candle-up: #b6e02a;     /* bullish candle (lime) */\n  --candle-down: #ec5a5d;   /* bearish candle */\n  --chart-zone: rgba(54, 200, 222, 0.30); /* cyan highlight zone */\n\n  /* ---- Semantic surface aliases ---- */\n  --surface-page: var(--navy-900);\n  --surface-nav: var(--navy-850);\n  --surface-card: var(--navy-700);\n  --surface-card-dark: var(--navy-800);\n  --surface-raised: var(--navy-600);\n  --surface-input: var(--navy-800);\n  --surface-hover: var(--navy-600);\n}\n\n/* ============================================================\n   SmartCharts — Typography tokens\n   Single family: Open Sans. Clean, neutral, highly legible at the\n   small sizes a data-dense trading UI demands. Headings are tight\n   and confident; labels are uppercased with tracking; numbers run\n   in the same family (tabular where it matters).\n   ============================================================ */\n:root {\n  --font-sans: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  /* Numeric/price contexts: same family, tabular figures */\n  --font-numeric: 'Open Sans', ui-monospace, 'SF Mono', menlo, monospace;\n\n  /* ---- Font sizes ---- */\n  --text-2xs: 11px;  /* micro labels, pill text */\n  --text-xs: 12px;   /* table meta, captions */\n  --text-sm: 13px;   /* secondary body, controls */\n  --text-base: 14px; /* default body */\n  --text-md: 15px;\n  --text-lg: 16px;\n  --text-xl: 18px;   /* card titles */\n  --text-2xl: 20px;\n  --text-3xl: 24px;  /* section headings */\n  --text-4xl: 28px;  /* page title (Welcome back) */\n  --text-5xl: 34px;\n  --text-6xl: 44px;\n\n  /* ---- Weights ---- */\n  --weight-light: 300;\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n  --weight-extrabold: 800;\n\n  /* ---- Line heights ---- */\n  --leading-tight: 1.15;\n  --leading-snug: 1.3;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---- Letter spacing ---- */\n  --tracking-tight: -0.01em;\n  --tracking-normal: 0;\n  --tracking-wide: 0.04em;\n  --tracking-wider: 0.08em;  /* uppercase nav labels */\n  --tracking-widest: 0.12em; /* tiny uppercase pills */\n}\n\n/* ============================================================\n   SmartCharts — Spacing, radii, shadows, borders, motion\n   Compact, grid-aligned spacing for a dense workspace. Cards are\n   softly rounded (10–14px) with quiet borders and low-contrast\n   shadows that read against the dark indigo ground.\n   ============================================================ */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* ---- Radii ---- */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;   /* buttons, pills, inputs */\n  --radius-lg: 10px;  /* default card */\n  --radius-xl: 14px;  /* large panels */\n  --radius-2xl: 18px;\n  --radius-pill: 999px;\n\n  /* ---- Borders ---- */\n  --border-width: 1px;\n\n  /* ---- Shadows (dark-ground; subtle elevation + accent glows) ---- */\n  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.35);\n  --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.35);\n  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.45);\n  --shadow-xl: 0 24px 60px rgba(0, 0, 0, 0.55);\n  /* Glows used for live/active states */\n  --glow-lime: 0 0 0 1px var(--brand-lime), 0 0 12px var(--brand-lime-glow);\n  --glow-cyan: 0 0 16px rgba(54, 200, 222, 0.45);\n  --glow-buy: 0 0 14px rgba(124, 191, 68, 0.40);\n\n  /* ---- Layout ---- */\n  --nav-height: 64px;\n  --container-max: 1440px;\n  --right-rail: 420px;\n\n  /* ---- Motion ---- */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 180ms; /* @kind other */\n  --duration-slow: 260ms; /* @kind other */\n  --transition-base: all var(--duration-base) var(--ease-out);\n}\n\n/* ============================================================\n   SmartCharts — base reset & element defaults\n   Sets the dark indigo ground and Open Sans defaults so any page\n   linking styles.css inherits the platform look immediately.\n   ============================================================ */\n*,\n*::before,\n*::after {\n  box-sizing: border-box;\n}\n\nhtml {\n  -webkit-text-size-adjust: 100%;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nbody {\n  margin: 0;\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  font-weight: var(--weight-regular);\n  line-height: var(--leading-normal);\n  color: var(--text-body);\n  background-color: var(--surface-page);\n}\n\nh1, h2, h3, h4, h5, h6 {\n  margin: 0;\n  color: var(--text-primary);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n}\n\np { margin: 0; }\n\na {\n  color: var(--brand-cyan);\n  text-decoration: none;\n  transition: color var(--duration-fast) var(--ease-out);\n}\na:hover { color: var(--brand-cyan-bright); }\n\nbutton {\n  font-family: inherit;\n  cursor: pointer;\n}\n\n/* Tabular figures for any price/number context */\n.tabular-nums {\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: 'tnum' 1;\n}\n\n/* Thin dark scrollbars matching the workspace */\n* {\n  scrollbar-width: thin;\n  scrollbar-color: var(--navy-600) transparent;\n}\n*::-webkit-scrollbar { width: 10px; height: 10px; }\n*::-webkit-scrollbar-track { background: transparent; }\n*::-webkit-scrollbar-thumb {\n  background: var(--navy-600);\n  border-radius: var(--radius-pill);\n  border: 2px solid transparent;\n  background-clip: padding-box;\n}\n*::-webkit-scrollbar-thumb:hover { background: var(--navy-500); }\n\n<\u002Fstyle>\n  <script src=\"3033d86d-10cf-4a8e-925f-09326e6e6c2b\"><\u002Fscript>\n  <script src=\"a6981df9-f095-4887-b83e-e173a48cc7fb\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"width: 1440px; font-family: var(--font-sans); color: var(--text-body); background: radial-gradient(1100px 700px at 8% -5%, rgba(40,57,92,0.55), transparent 60%), radial-gradient(900px 600px at 105% 110%, rgba(47,128,200,0.10), transparent 55%), var(--surface-page); display: grid; grid-template-columns: 300px minmax(0,1fr) 360px; gap: 36px; padding: 34px 40px 60px; align-items: start;\">\n\n  <!-- ============ LEFT SIDEBAR ============ -->\n  <aside style=\"display: flex; flex-direction: column; position: sticky; top: 34px;\">\n    <img src=\"e7a8fd71-3166-42f1-8cb6-59fc59d4c230\" alt=\"SmartCharts\" style=\"width: 168px; margin-bottom: 30px;\">\n    <div style=\"font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px;\">Hi Neil!<\u002Fdiv>\n\n    <div style=\"position: relative; width: 128px; height: 128px; margin-bottom: 30px;\">\n      <div style=\"width: 128px; height: 128px; border-radius: 50%; background: linear-gradient(150deg,#f6cf52,#e0a52a); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 26px rgba(224,165,42,0.30);\">\n        <span style=\"font-size: 40px; font-weight: 800; color: #1a1330; letter-spacing: 0.02em;\">NJ<\u002Fspan>\n      <\u002Fdiv>\n      <button type=\"button\" title=\"Edit avatar\" style=\"position: absolute; right: 4px; bottom: 4px; width: 34px; height: 34px; border-radius: 50%; background: var(--brand-cyan); border: 3px solid var(--surface-page); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #08231f;\" style-hover=\"background: var(--brand-cyan-bright)\">\n        <i data-lucide=\"pencil\" width=\"14\" height=\"14\"><\u002Fi>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <nav style=\"display: flex; flex-direction: column; gap: 6px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n        <sc-if value=\"{{ item.active }}\" hint-placeholder-val=\"{{ false }}\">\n          <button type=\"button\" onclick=\"{{ item.go }}\" style=\"display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; padding: 12px 14px; border-radius: var(--radius-md); cursor: pointer; border: 1px solid var(--border-default); background: var(--surface-card); color: var(--text-primary); position: relative;\">\n            <span style=\"position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px; border-radius: 3px; background: var(--brand-cyan); box-shadow: var(--glow-cyan);\"><\u002Fspan>\n            <span style=\"display: inline-flex; color: var(--brand-cyan);\"><i data-lucide=\"{{ item.icon }}\" width=\"19\" height=\"19\"><\u002Fi><\u002Fspan>\n            <span style=\"font-size: 15px; font-weight: 600;\">{{ item.label }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ item.inactive }}\" hint-placeholder-val=\"{{ true }}\">\n          <button type=\"button\" onclick=\"{{ item.go }}\" style=\"display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; padding: 12px 14px; border-radius: var(--radius-md); cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--text-secondary); transition: var(--transition-base);\" style-hover=\"background: var(--surface-card-dark); color: var(--text-primary)\">\n            <span style=\"display: inline-flex;\"><i data-lucide=\"{{ item.icon }}\" width=\"19\" height=\"19\"><\u002Fi><\u002Fspan>\n            <span style=\"font-size: 15px; font-weight: 500;\">{{ item.label }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fsc-for>\n\n      <div style=\"height: 1px; background: var(--border-line); margin: 12px 6px;\"><\u002Fdiv>\n\n      <button type=\"button\" style=\"display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; padding: 12px 14px; border-radius: var(--radius-md); cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--text-secondary); transition: var(--transition-base);\" style-hover=\"background: var(--surface-card-dark); color: var(--loss)\">\n        <span style=\"display: inline-flex;\"><i data-lucide=\"log-out\" width=\"19\" height=\"19\"><\u002Fi><\u002Fspan>\n        <span style=\"font-size: 15px; font-weight: 500;\">Logout<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fnav>\n  <\u002Faside>\n\n  <!-- ============ MAIN CONTENT ============ -->\n  <main style=\"min-width: 0;\">\n    <!-- Header (per view) -->\n    <div style=\"display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 18px;\">\n      <div>\n        <div style=\"font-size: 12px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px;\">{{ header.eyebrow }}<\u002Fdiv>\n        <div style=\"font-size: 28px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.01em;\">{{ header.title }}<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ isInvoicesView }}\" hint-placeholder-val=\"{{ false }}\">\n        <x-import component-from-global-scope=\"SmartChartsDesignSystem_10c8d5.Button\" variant=\"outline\" size=\"sm\" hint-size=\"150px,30px\"><i data-lucide=\"download\" width=\"14\" height=\"14\"><\u002Fi>Download all<\u002Fx-import>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- Tabs (profile view only) -->\n    <sc-if value=\"{{ isProfile }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-bottom: 26px;\">\n        <x-import component-from-global-scope=\"SmartChartsDesignSystem_10c8d5.SegmentedTabs\" tabs=\"{{ tabs }}\" value=\"{{ tab }}\" on-change=\"{{ setTab }}\" hint-size=\"380px,44px\"><\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== DASHBOARD ===== -->\n    <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <div style=\"background: var(--surface-card-dark); border: 1px solid var(--border-default); border-radius: var(--radius-xl); box-shadow: var(--shadow-md); padding: 28px 30px;\">\n          <div style=\"font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px;\">Welcome back, Neil.<\u002Fdiv>\n          <div style=\"font-size: 15px; color: var(--text-secondary); line-height: 1.55; max-width: 560px;\">Use the navigation on the left to manage your profile, invoices, and subscription — everything about your SmartCharts membership lives here.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 18px;\">\n          <sc-for list=\"{{ dashTiles }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div style=\"background: var(--surface-card); border: 1px solid var(--border-default); border-radius: var(--radius-xl); box-shadow: var(--shadow-md); padding: 20px 22px;\">\n              <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;\">\n                <span style=\"width: 40px; height: 40px; border-radius: var(--radius-md); background: var(--surface-card-dark); display: inline-flex; align-items: center; justify-content: center; color: var(--brand-cyan);\"><i data-lucide=\"{{ t.icon }}\" width=\"20\" height=\"20\"><\u002Fi><\u002Fspan>\n                <sc-if value=\"{{ t.chip }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"display: inline-flex; align-items: center; background: var(--buy-bg); color: var(--buy); border-radius: var(--radius-pill); padding: 4px 11px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;\">{{ t.chip }}<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size: 12px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;\">{{ t.label }}<\u002Fdiv>\n              <div style=\"font-size: 22px; font-weight: 800; color: var(--text-primary); line-height: 1.2;\">{{ t.value }}<\u002Fdiv>\n              <div style=\"font-size: 13px; color: var(--text-secondary); margin-top: 4px;\">{{ t.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== PROFILE PANEL ===== -->\n    <sc-if value=\"{{ showProfilePanel }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background: var(--surface-card-dark); border: 1px solid var(--border-default); border-radius: var(--radius-xl); box-shadow: var(--shadow-md); padding: 24px 22px;\">\n        <div style=\"display: flex; align-items: center; gap: 16px; padding-bottom: 20px; border-bottom: 1px solid var(--border-subtle);\">\n          <div style=\"width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(150deg,#f6cf52,#e0a52a); display: flex; align-items: center; justify-content: center; flex-shrink: 0;\">\n            <span style=\"font-size: 19px; font-weight: 800; color: #1a1330;\">NJ<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 22px; font-weight: 700; color: var(--text-primary);\">Neil Johnson<\u002Fdiv>\n            <div style=\"font-size: 14px; color: var(--text-secondary);\">neil+wc3@aimm.co<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"margin-left: auto;\">\n            <x-import component-from-global-scope=\"SmartChartsDesignSystem_10c8d5.Button\" variant=\"outline\" size=\"sm\" hint-size=\"128px,30px\"><i data-lucide=\"pencil\" width=\"14\" height=\"14\"><\u002Fi>Edit profile<\u002Fx-import>\n          <\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px;\">\n          <div>\n            <div style=\"font-size: 12px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.12em; margin: 24px 0 4px;\">Personal information<\u002Fdiv>\n            <sc-for list=\"{{ personal }}\" as=\"row\" hint-placeholder-count=\"6\">\n              <div style=\"display: grid; grid-template-columns: 104px minmax(0,1fr) 16px; align-items: center; gap: 8px; padding: 13px 2px; border-top: 1px solid var(--border-subtle);\">\n                <span style=\"font-size: 13px; color: var(--text-secondary);\">{{ row.label }}<\u002Fspan>\n                <span style=\"font-size: 15px; color: var(--text-primary); font-weight: 500;\">{{ row.value }}<\u002Fspan>\n                <span style=\"display: inline-flex; color: var(--text-tertiary);\"><i data-lucide=\"{{ row.icon }}\" width=\"14\" height=\"14\"><\u002Fi><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 12px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.12em; margin: 24px 0 4px;\">Address<\u002Fdiv>\n            <sc-for list=\"{{ address }}\" as=\"row\" hint-placeholder-count=\"7\">\n              <div style=\"display: grid; grid-template-columns: 104px minmax(0,1fr) 16px; align-items: center; gap: 8px; padding: 13px 2px; border-top: 1px solid var(--border-subtle);\">\n                <span style=\"font-size: 13px; color: var(--text-secondary);\">{{ row.label }}<\u002Fspan>\n                <span style=\"font-size: 15px; color: var(--text-primary); font-weight: 500;\">{{ row.value }}<\u002Fspan>\n                <span style=\"display: inline-flex; color: var(--text-tertiary);\"><i data-lucide=\"{{ row.icon }}\" width=\"14\" height=\"14\"><\u002Fi><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 8px;\">\n          <div style=\"font-size: 12px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.12em; margin: 24px 0 4px;\">Preferences<\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 0 18px;\">\n            <sc-for list=\"{{ prefs }}\" as=\"row\" hint-placeholder-count=\"3\">\n              <div style=\"display: grid; grid-template-columns: 104px minmax(0,1fr) 16px; align-items: center; gap: 8px; padding: 13px 2px; border-top: 1px solid var(--border-subtle);\">\n                <span style=\"font-size: 13px; color: var(--text-secondary);\">{{ row.label }}<\u002Fspan>\n                <span style=\"font-size: 15px; color: var(--text-primary); font-weight: 500;\">{{ row.value }}<\u002Fspan>\n                <span style=\"display: inline-flex; color: var(--text-tertiary);\"><i data-lucide=\"{{ row.icon }}\" width=\"14\" height=\"14\"><\u002Fi><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SUBSCRIPTIONS ===== -->\n    <sc-if value=\"{{ showSubs }}\" hint-placeholder-val=\"{{ false }
